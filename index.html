<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Veiculo</title>

    <link rel="stylesheet" href="css/style_veiculo.css">
    <script src="js/script_veiculo.js" type="module" defer></script>
</head>
<body>
    <div id="geral">

        <div id="form">
        <form id="formulario">
            <label for="marca">Marca</label>
            <input type="text" name="marca" id="marca">

            <label for="modelo">Modelo</label>
            <input type="text" name="modelo" id="modelo">

            <label for="placa">Placa</label>
            <input type="text" name="placa" id="placa">

            <label for="ano">Ano de fabricação</label>
            <input type="text" name="ano" id="ano">

            <label for="valor">Valor do veículo</label>
            <input type="text" name="valor" id="valor">
            
            <label for="combustivel">Gasolina 1, etanol 2, biocombustiveis 3, híbridos 4 e eletrico 5</label>
            <input type="text" name="combustivel" id="combustivel">

            <button type="submit"> Salvar </button>
        </form>
        </div>

        <div id="resultado"></div>
    </div>
</body>
</html>
